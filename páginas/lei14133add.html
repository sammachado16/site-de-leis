<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar artigos</title>
    <link rel="stylesheet" href="../estilos/add.css">
</head>
<body>
        <p>Número do artigo</p>
        <input type="number" name="artigo" id="artigo">
        <p>Texto do caput</p>
        <textarea name="art" id="art"></textarea> <br>

        <input type="submit" value="Novo inciso" name="novo-inc" id="novo-inc" onclick=AddInciso()>
        <p id="inciso"></p>
        
        <input type="submit" value="Nova alínea" name="nova-ali" id="nova-ali" onclick=AddAlinea()>
        <p id="alinea"></p>

        <input type="submit" value="Novo parágrafo" name="novo-parag" id="novo-parag">
        <p id="parag"></p>
        
        <p id="teste"></p>
    <script src="script.js"></script>
</body>
</html>
